name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --name Grinding_Line_Simulator app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Grinding_Line_Simulator_Windows
          path: dist/Grinding_Line_Simulator.exe
